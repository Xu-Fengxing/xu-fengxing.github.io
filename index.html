<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风行Justin - 个人空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            font-weight: 300;
            color: #1d1d1f;
        }
        
        .title {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1d1d1f;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 3rem;
            color: #86868b;
        }
        
        .status-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 3rem 2rem;
            margin-bottom: 3rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .status-text {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 2rem;
            color: #1d1d1f;
        }
        
        .progress-container {
            margin-bottom: 2rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e5e7;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007aff, #5856d6);
            width: 0%;
            border-radius: 4px;
            animation: progressAnimation 3s ease-in-out forwards;
        }
        
        @keyframes progressAnimation {
            0% { width: 0%; }
            100% { width: 75%; }
        }
        
        .progress-text {
            font-size: 0.9rem;
            color: #86868b;
            font-weight: 400;
        }
        
        .description {
            font-size: 1.1rem;
            color: #515154;
            margin-bottom: 2rem;
            font-weight: 400;
        }
        
        .completion-date {
            font-size: 1rem;
            color: #86868b;
            font-weight: 400;
        }
        
        .links-section {
            background: #ffffff;
            border-radius: 18px;
            padding: 2.5rem 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .links-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #1d1d1f;
        }
        
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .link-item {
            background: #f5f5f7;
            border-radius: 12px;
            padding: 1.5rem 1rem;
            text-decoration: none;
            color: #1d1d1f;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        
        .link-item:hover {
            background: #e5e5e7;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            border-color: #007aff;
        }
        
        .footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #86868b;
            font-weight: 400;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .logo {
                font-size: 3rem;
            }
            
            .title {
                font-size: 2.5rem;
            }
            
            .subtitle {
                font-size: 1.25rem;
            }
            
            .status-card, .links-section {
                padding: 2rem 1.5rem;
            }
            
            .links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1 class="title">风行Justin</h1>
        <p class="subtitle">个人空间</p>
        
        <div class="status-card">
            <div class="status-text">网站正在建设中</div>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="progress-text">75% 完成</div>
            </div>
            <div class="description">用极简的视角，分享设计与开发的思考与实践</div>
            <div class="completion-date">预计完成时间：2025年11月</div>
        </div>
        
        <div class="links-section">
            <h2 class="links-title">友情链接</h2>
            <div class="links-grid">
                <a href="https://blog.pljzy.top/" target="_blank" rel="noopener" class="link-item">
                    pljzy's blog
                </a>
                <a href="https://blog.zhheo.com/link/" target="_blank" rel="noopener" class="link-item">
                    张洪Heo
                </a>
                <a href="https://champhoon.xyz/" target="_blank" rel="noopener" class="link-item">
                    ChaM&log
                </a>
            </div>
        </div>
        
        <div class="footer">
            © 2025 风行Justin. 保留所有权利.
        </div>
    </div>
</body>
</html>
