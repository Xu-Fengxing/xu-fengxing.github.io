<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风行Justin - 个人空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }
        
        .left-section {
            text-align: left;
        }
        
        .logo {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 300;
        }
        
        .title {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 2rem;
            color: #a1a1a6;
        }
        
        .status-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            color: #ffffff;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333333;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007aff, #5856d6);
            width: 75%;
            border-radius: 3px;
            animation: progressAnimation 2s ease-in-out forwards;
        }
        
        @keyframes progressAnimation {
            0% { width: 0%; }
            100% { width: 75%; }
        }
        
        .progress-text {
            font-size: 0.9rem;
            color: #a1a1a6;
            margin-bottom: 1.5rem;
        }
        
        .description {
            font-size: 1rem;
            color: #a1a1a6;
            margin-bottom: 1rem;
        }
        
        .completion-date {
            font-size: 0.9rem;
            color: #666666;
        }
        
        .right-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .links-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #ffffff;
        }
        
        .link-item {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid #333333;
            display: block;
        }
        
        .link-item:hover {
            background: #2c2c2e;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 122, 255, 0.3);
            border-color: #007aff;
        }
        
        .footer {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #666666;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                gap: 2rem;
                padding: 1rem;
            }
            
            .left-section {
                text-align: center;
            }
            
            .logo {
                font-size: 2rem;
            }
            
            .title {
                font-size: 2rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="logo">🚀</div>
            <h1 class="title">风行Justin</h1>
            <p class="subtitle">个人空间</p>
            
            <div class="status-text">网站正在建设中</div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-text">75% 完成</div>
            
            <div class="description">用极简的视角，分享设计与开发的思考与实践</div>
            <div class="completion-date">预计完成时间：2025年11月</div>
        </div>
        
        <div class="right-section">
            <h2 class="links-title">友情链接</h2>
            <a href="https://blog.pljzy.top/" target="_blank" rel="noopener" class="link-item">
                pljzy's blog
            </a>
            <a href="https://blog.zhheo.com/link/" target="_blank" rel="noopener" class="link-item">
                张洪Heo
            </a>
            <a href="https://champhoon.xyz/" target="_blank" rel="noopener" class="link-item">
                ChaM&log
            </a>
        </div>
    </div>
    
    <div class="footer">
        © 2025 风行Justin. 保留所有权利.
    </div>
</body>
</html>
